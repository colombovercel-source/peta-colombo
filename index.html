<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dimerla Pro | Advanced Navigation System</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        /* 2. MODERN DESIGN SYSTEM */
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
            overflow: hidden; /* Mencegah scroll double */
        }

        /* 3. PROFESSIONAL NAVBAR */
        .navbar {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 22px; color: var(--primary); letter-spacing: -1px; }

        .nav-actions { display: flex; gap: 12px; align-items: center; }

        .btn-icon {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 40px; height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }

        /* 4. AUTH SECTION (GLASSMORPHISM) */
        .auth-wrapper {
            height: calc(100vh - 70px);
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at top right, var(--primary), transparent);
        }

        .auth-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            width: 100%; max-width: 400px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
        }

        .auth-card h2 { margin-bottom: 8px; font-weight: 800; }
        .auth-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }

        input {
            width: 100%; padding: 14px; margin-bottom: 16px;
            border-radius: 12px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text-main);
            font-size: 15px; outline: none;
        }

        input:focus { border-color: var(--primary); ring: 2px var(--primary); }

        /* 5. MAP SECTION */
        #app-content { display: none; height: calc(100vh - 70px); position: relative; }

        #map { height: 100%; width: 100%; }

        /* Customizing Leaflet Search Control to look better */
        .leaflet-control-geocoder {
            border-radius: 12px !important;
            box-shadow: var(--shadow) !important;
            border: none !important;
        }

        .log-panel {
            position: absolute;
            bottom: 30px; left: 30px;
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            width: 320px;
            box-shadow: var(--shadow);
            z-index: 1000;
            border: 1px solid var(--border);
        }

        .log-header { font-weight: 700; font-size: 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        #log-list { max-height: 120px; overflow-y: auto; font-size: 13px; color: var(--text-muted); }
        .log-entry { padding: 6px 0; border-bottom: 1px solid var(--border); }

        /* Hidden default routing panel for cleaner look */
        .leaflet-routing-container { display: none; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">DIMERLA<span style="color:var(--text-main)">.PRO</span></div>
        <div class="nav-actions">
            <button class="btn-icon" onclick="toggleTheme()" id="themeBtn">🌓</button>
            <button class="btn-primary" id="logoutBtn" style="display:none; background:#ef4444;" onclick="logout()">Keluar</button>
        </div>
    </header>

    <main id="auth-section" class="auth-wrapper">
        <div class="auth-card">
            <h2 id="title">Selamat Datang</h2>
            <p id="subtitle">Silakan masuk untuk melanjutkan navigasi</p>
            
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            
            <button class="btn-primary" style="width:100%" onclick="processAuth()" id="actionBtn">Masuk</button>
            
            <p style="margin-top:20px; font-size:13px; color:var(--text-muted)">
                <span id="toggleText">Belum punya akun?</span> 
                <span onclick="toggleMode()" style="color:var(--primary); font-weight:600; cursor:pointer">Klik di sini</span>
            </p>
        </div>
    </main>

    <main id="app-content">
        <div id="map"></div>
        
        <div class="log-panel">
            <div class="log-header">🛰️ Navigasi Status</div>
            <div id="log-list">
                <div class="log-entry">Menunggu otentikasi...</div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        let map, userLoc, routingCtrl;
        let isLogin = true;

        // 1. THEME TOGGLE
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('pro_theme', target);
        }
        if(localStorage.getItem('pro_theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

        // 2. AUTHENTICATION SYSTEM
        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "Selamat Datang" : "Daftar Akun";
            document.getElementById('actionBtn').innerText = isLogin ? "Masuk" : "Buat Akun";
            document.getElementById('toggleText').innerText = isLogin ? "Belum punya akun?" : "Sudah punya akun?";
        }

        function processAuth() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(!u || !p) return;

            if(isLogin) {
                if(localStorage.getItem(`pro_u_${u}`) === p) {
                    localStorage.setItem('pro_session', u);
                    startApp();
                } else { alert("Kredensial salah"); }
            } else {
                localStorage.setItem(`pro_u_${u}`, p);
                alert("Berhasil terdaftar!");
                toggleMode();
            }
        }

        // 3. CORE MAP & NAVIGATION
        function startApp() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'block';

            // Init Map (World View)
            map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // Add Zoom Control to Bottom Right
            L.control.zoom({ position: 'bottomright' }).addTo(map);

            // Search Feature (Geocoder)
            const geocoder = L.Control.geocoder({
                defaultMarkGeocode: false,
                placeholder: "Cari lokasi di seluruh dunia...",
                position: 'topleft'
            }).on('markgeocode', function(e) {
                const dest = e.geocode.center;
                if(userLoc) {
                    calculateRoute(userLoc, dest, e.geocode.name);
                } else {
                    map.flyTo(dest, 16);
                    L.marker(dest).addTo(map).bindPopup(e.geocode.name).openPopup();
                }
            }).addTo(map);

            // Geolocation (GPS)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLoc = L.latLng(pos.coords.latitude, pos.coords.longitude);
                    map.flyTo(userLoc, 15);
                    L.circle(userLoc, { radius: 200, color: '#6366f1' }).addTo(map);
                    addLog("Lokasi Anda berhasil diverifikasi.");
                }, () => addLog("GPS tidak aktif. Gunakan pencarian."));
            }
        }

        function calculateRoute(start, end, name) {
            if(routingCtrl) map.removeControl(routingCtrl);

            routingCtrl = L.Routing.control({
                waypoints: [start, end],
                lineOptions: { styles: [{ color: '#6366f1', weight: 6, opacity: 0.8 }] },
                createMarker: function() { return null; }
            }).on('routesfound', function(e) {
                const r = e.routes[0];
                const km = (r.summary.totalDistance / 1000).toFixed(1);
                const min = Math.round(r.summary.totalTime / 60);
                addLog(`Tujuan: ${name}`);
                addLog(`Jarak: ${km} km | Estimasi: ${min} menit`);
            }).addTo(map);
        }

        function addLog(msg) {
            const list = document.getElementById('log-list');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<b>></b> ${msg}`;
            list.prepend(entry);
        }

        function logout() { localStorage.removeItem('pro_session'); location.reload(); }
        if(localStorage.getItem('pro_session')) startApp();

    </script>
</body>
</html>
